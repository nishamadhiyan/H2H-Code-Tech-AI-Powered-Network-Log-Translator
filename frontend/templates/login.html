<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetLogAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #0f1629;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --text: #c9d8f0;
      --muted: #4a6080;
      --error: #ff3860;
      --success: #23d160;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .auth-card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,212,255,0.05);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .logo b { color: var(--accent); }
    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-bottom: 2rem;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .tab {
      flex: 1;
      padding: 0.7rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #000;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group input {
      width: 100%;
      background: #060c1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), #0077ff);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .message {
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .error { background: rgba(255,56,96,0.15); color: var(--error); border: 1px solid var(--error); }
    .success { background: rgba(35,209,96,0.15); color: var(--success); border: 1px solid var(--success); }
    .hidden { display: none !important; }
    .default-creds {
      margin-top: 1rem;
      padding: 0.8rem;
      background: #060c1a;
      border-radius: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="auth-card">
    <div class="logo">⬡ NetLog<b>AI</b></div>
    <p class="tagline">SECURE LOG ANALYSIS PLATFORM</p>

    <div id="message" class="message hidden"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password"
          onkeydown="if(event.key==='Enter') login()"/>
      </div>
      <button class="btn" onclick="login()">🔐 Login</button>
      <div class="default-creds">
        Default: admin / admin123
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters"/>
      </div>
      <button class="btn" onclick="register()">✅ Create Account</button>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
      });
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      hideMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    function hideMessage() {
      document.getElementById('message').className = 'message hidden';
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!username || !password) {
        showMessage('Please fill in all fields', 'error'); return;
      }
      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);
      const res = await fetch('/token', { method: 'POST', body: formData });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('username', username);
        showMessage('✅ Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        showMessage('❌ ' + (data.detail || 'Login failed'), 'error');
      }
    }

    async function register() {
  const full_name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  
  if (!full_name || !email || !username || !password) {
    showMessage('Please fill in all fields', 'error'); 
    return;
  }

  if (password.length < 6) {
    showMessage('Password must be at least 6 characters', 'error');
    return;
  }

  try {
    const formData = new FormData();
    formData.append('username', username);
    formData.append('password', password);
    formData.append('email', email);
    formData.append('full_name', full_name);
    
    const res = await fetch('/register', { 
      method: 'POST', 
      body: formData 
    });
    
    const data = await res.json();
    
    if (res.ok) {
      showMessage('✅ Account created! Please login.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } else {
      showMessage('❌ ' + (data.detail || 'Registration failed'), 'error');
    }
  } catch(err) {
    showMessage('❌ Error: ' + err.message, 'error');
  }
}
  </script>
</body>
</html>
